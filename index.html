<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GLB Viewer</title>
  <style>
    body { margin:0; overflow:hidden; }
    canvas { display:block; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
      "GLTFLoader": "https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js",
      "OrbitControls": "https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'GLTFLoader';
import { OrbitControls } from 'OrbitControls';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,4,9);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0,1,0);
controls.update();

// ライト
const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
hemiLight.position.set(0,20,0);
scene.add(hemiLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(3,10,10);
scene.add(dirLight);

// 部位ごとの色
function getBoneColor(name) {
  const n = name.toLowerCase();
  if (n.includes("arm")) return 0xff0000;
  if (n.includes("leg")) return 0x0000ff;
  if (n.includes("spine")) return 0x00ff00;
  if (n.includes("head")) return 0xffff00;
  return 0x800080;
}

// グローバル配列
const boneLines = [];
const boneHandles = [];

function visualizeBones(model) {
  model.updateMatrixWorld(true);

  model.traverse(obj => {
    if (!obj.isSkinnedMesh) return;
    const skeleton = obj.skeleton;

    skeleton.bones.forEach(bone => {
      if (!bone.parent || !skeleton.bones.includes(bone.parent)) return;

      // ワールド座標ボーン線
      const start = new THREE.Vector3();
      const end = new THREE.Vector3();
      bone.getWorldPosition(start);
      bone.parent.getWorldPosition(end);

      const geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
      const material = new THREE.LineBasicMaterial({ color: getBoneColor(bone.name), depthTest:false });
      const line = new THREE.Line(geometry, material);
      line.userData = { bone: bone, parentBone: bone.parent };
      scene.add(line);
      boneLines.push(line);

      // ボーン先端ハンドル（ワールド座標）
      const handleGeom = new THREE.SphereGeometry(0.03);
      const handleMat = new THREE.MeshBasicMaterial({ color: getBoneColor(bone.name), depthTest:false });
      const handle = new THREE.Mesh(handleGeom, handleMat);
      const pos = new THREE.Vector3();
      bone.getWorldPosition(pos);
      handle.position.copy(pos);
      handle.boneRef = bone;
      scene.add(handle);
      boneHandles.push(handle);
    });
  });
}

function updateBoneLines() {
  if(!boneLines || !boneHandles) return;

  boneLines.forEach(line => {
    const start = new THREE.Vector3();
    const end = new THREE.Vector3();
    line.userData.bone.getWorldPosition(start);
    line.userData.parentBone.getWorldPosition(end);
    line.geometry.setFromPoints([start, end]);
  });

  boneHandles.forEach(h => 
    h.position.copy(h.boneRef.getWorldPosition(new THREE.Vector3()))
  );
}

// GLB読み込み
const loader = new GLTFLoader();
let mixer, model;
loader.load('model.glb',
  gltf => {
    model = gltf.scene;
    scene.add(model);

    visualizeBones(model);

    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach(clip => mixer.clipAction(clip).play());
    }
  },
  undefined,
  error => console.error('GLB読み込みエラー:', error)
);

// ボーンドラッグ
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedBone = null;

let plane = new THREE.Plane();
let offset = new THREE.Vector3();

const dragOffset = new THREE.Vector3();

window.addEventListener('mousedown', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(boneHandles);
  if (intersects.length > 0) {
    selectedBone = intersects[0].object.boneRef;

    // 平面をカメラ方向で作る
    plane.setFromNormalAndCoplanarPoint(
      camera.getWorldDirection(new THREE.Vector3()),
      selectedBone.getWorldPosition(new THREE.Vector3())
    );

    // マウスのワールド位置に対するオフセット
    raycaster.ray.intersectPlane(plane, dragOffset);
    const boneWorldPos = selectedBone.getWorldPosition(new THREE.Vector3());
    dragOffset.sub(boneWorldPos);

    controls.enabled = false;
  }
});

window.addEventListener('mousemove', e => {
  if (!selectedBone) return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const targetWorld = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, targetWorld);
  targetWorld.sub(dragOffset); // オフセット補正

  const parent = selectedBone.parent;
  if (!parent) return;

  // 親ボーンのワールド位置
  const parentPos = new THREE.Vector3();
  parent.getWorldPosition(parentPos);

  // 掴んだボーン先端の現在位置（ワールド座標）
  const currentTip = selectedBone.getWorldPosition(new THREE.Vector3());

  // 新しい方向ベクトル
  const newDir = targetWorld.clone().sub(parentPos).normalize();
  const oldDir = currentTip.clone().sub(parentPos).normalize();

  // 回転軸・角度を計算
  const axis = new THREE.Vector3().crossVectors(oldDir, newDir).normalize();
  const angle = Math.acos(THREE.MathUtils.clamp(oldDir.dot(newDir), -1, 1));

  if (axis.lengthSq() > 1e-6 && angle > 1e-6) {
    const quat = new THREE.Quaternion();
    quat.setFromAxisAngle(axis, angle);

    // 親ボーンのワールド回転に適用
    const parentWorldQuat = parent.getWorldQuaternion(new THREE.Quaternion());
    parentWorldQuat.premultiply(quat);

    // ワールド→ローカル回転
    if (parent.parent) {
      const parentInv = parent.parent.getWorldQuaternion(new THREE.Quaternion()).invert();
      parent.quaternion.copy(parentWorldQuat.premultiply(parentInv));
    } else {
      parent.quaternion.copy(parentWorldQuat);
    }
  }

});

window.addEventListener('mouseup', () => {
  selectedBone = null;
  controls.enabled = true;
});

// アニメーションループ
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  if (mixer) mixer.update(clock.getDelta());
  updateBoneLines()
  renderer.render(scene, camera);
}
animate();

// リサイズ対応
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
